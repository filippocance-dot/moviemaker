{% extends "base.html" %}
{% block nav_right %}
  <a href="/chat/storia" class="nav-link">Storico</a>
  <span class="nav-badge">claude opus</span>
  <a href="/logout" class="nav-link">Esci</a>
{% endblock %}
{% block content %}
<style>
  #chat-wrap { display:flex; flex-direction:column; height:calc(100vh - 44px); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 40px 48px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg { display:flex; flex-direction:column; }
  .msg.user { align-items: flex-end; }
  .msg.ai   { align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--label);
    margin-bottom: 6px;
    opacity: 0.6;
  }

  /* AI — no bubble, just text from left */
  .msg.ai .msg-bubble {
    font-size: 14.5px;
    line-height: 1.8;
    color: var(--text);
    max-width: 72%;
  }

  /* User — pill bubble on right */
  .msg.user .msg-bubble {
    background: #1c1c1e;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px 18px 4px 18px;
    padding: 10px 16px;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    max-width: 60%;
    white-space: pre-wrap;
  }

  /* ── INPUT ── */
  #input-area {
    border-top: 1px solid var(--border);
    padding: 12px 48px 20px;
    background: rgba(10,11,13,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  #attach-preview {
    font-size: 11px;
    color: var(--label);
    margin-bottom: 6px;
    display: none;
  }
  #attach-preview.visible { display: block; }

  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 22px;
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #input-row:focus-within {
    border-color: rgba(255,255,255,0.28);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  #chat-input {
    flex: 1;
    background: transparent;
    border: none;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    outline: none;
    resize: none;
    line-height: 1.55;
    min-height: 20px;
    max-height: 160px;
    overflow-y: auto;
  }
  #chat-input::placeholder { color: var(--label); opacity: 0.5; }

  #attach-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--label);
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  #attach-btn:hover { background: var(--elevated); color: var(--text); }

  #send-btn {
    background: #f0ece6;
    border: none;
    cursor: pointer;
    color: #0a0b0d;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  #send-btn:hover { opacity: 0.85; transform: scale(0.95); }

  #input-hint {
    font-size: 11px;
    color: var(--label);
    text-align: center;
    margin-top: 7px;
    opacity: 0.4;
    letter-spacing: 0.02em;
  }

  #scroll-btn {
    position: fixed;
    bottom: 110px;
    right: 48px;
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--label);
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 6px 12px;
    cursor: pointer;
    display: none;
    font-family: var(--font);
    border-radius: 20px;
    transition: opacity 0.2s;
  }
  #scroll-btn.visible { display: block; }
</style>

<div id="chat-wrap">
  <div id="messages"></div>
  <div id="input-area">
    <div id="attach-preview"></div>
    <div id="input-row">
      <button id="attach-btn" title="Allega file" onclick="document.getElementById('file-input').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="file" id="file-input" style="display:none"
        accept=".pdf,.txt,.md,.jpg,.jpeg,.png,.webp,.gif">
      <textarea id="chat-input" placeholder="Scrivi un messaggio…" rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Invia">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div id="input-hint">↵ invio &nbsp;·&nbsp; ⇧↵ nuova riga</div>
  </div>
</div>
<button id="scroll-btn" onclick="scrollToBottom(true)">↓ in fondo</button>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const SESSION_ID = {{ session_id }};
const IS_FIRST_SESSION = {{ 'true' if is_first_session else 'false' }};
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('chat-input');
const attachPreview = document.getElementById('attach-preview');
const scrollBtn = document.getElementById('scroll-btn');
const fileInput = document.getElementById('file-input');

let conversation = [];
let attachment = null;
let userScrolled = false;

inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

messagesEl.addEventListener('scroll', () => {
  const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
  userScrolled = !atBottom;
  scrollBtn.classList.toggle('visible', userScrolled);
});

function scrollToBottom(force) {
  if (force || !userScrolled) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
    userScrolled = false;
    scrollBtn.classList.remove('visible');
  }
}

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) {
    attachPreview.textContent = 'File troppo grande (max 10 MB).';
    attachPreview.classList.add('visible');
    fileInput.value = '';
    return;
  }
  attachPreview.textContent = 'Caricamento\u2026';
  attachPreview.classList.add('visible');

  const formData = new FormData();
  formData.append('file', file);
  const res = await fetch('/chat/upload', { method: 'POST', body: formData });
  if (!res.ok) {
    attachPreview.textContent = 'Errore nel caricamento.';
    return;
  }
  attachment = await res.json();
  attachPreview.textContent = '\u2713 ' + file.name + ' allegato';
  fileInput.value = '';
});

function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + (role === 'user' ? 'user' : 'ai');

  if (role === 'user') {
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Tu';
    msg.appendChild(label);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble' + (role === 'ai' ? ' md' : '');

  if (typeof content === 'string') {
    bubble.textContent = content;
  }

  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  scrollToBottom();
  return bubble;
}

function renderMarkdown(el, text) {
  el.innerHTML = marked.parse(text);
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text && !attachment) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';

  let userContent;
  if (attachment && attachment.type === 'image_url') {
    userContent = [
      { type: 'text', text: text || 'Analizza questa immagine.' },
      { type: 'image_url', image_url: { url: attachment.url } }
    ];
  } else if (attachment && attachment.type === 'text') {
    userContent = (text ? text + '\n\n' : '') + '[Documento allegato]\n' + attachment.content;
  } else {
    userContent = text;
  }

  const displayText = text || (attachment ? '[file allegato]' : '');
  addMessage('user', displayText);

  attachment = null;
  attachPreview.textContent = '';
  attachPreview.classList.remove('visible');

  conversation.push({ role: 'user', content: userContent });

  const aiBubble = addMessage('ai', '');
  let full = '';

  const res = await fetch('/chat/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ conversation, session_id: SESSION_ID })
  });

  await readStream(res, aiBubble, (text) => { full = text; });
  renderMarkdown(aiBubble, full);
  conversation.push({ role: 'assistant', content: full });
}

async function readStream(res, bubble, onUpdate) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder('utf-8', { fatal: false });
  let full = '';
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        const data = line.slice(6);
        if (data === '[DONE]') { onUpdate(full); return; }
        full += data;
        bubble.textContent = full;
        scrollToBottom();
      }
    }
  }
  onUpdate(full);
}

async function streamWelcome() {
  const aiBubble = addMessage('ai', '');
  let full = '';
  const res = await fetch('/chat/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ conversation: [], welcome: true })
  });
  await readStream(res, aiBubble, (text) => { full = text; });
  renderMarkdown(aiBubble, full);
  conversation.push({ role: 'assistant', content: full });
}

if (IS_FIRST_SESSION) streamWelcome();

window.addEventListener('beforeunload', () => {
  if (conversation.length === 0) return;
  navigator.sendBeacon('/chat/end-session', new Blob(
    [JSON.stringify({ session_id: SESSION_ID, conversation: conversation })],
    { type: 'application/json' }
  ));
});
</script>
{% endblock %}
